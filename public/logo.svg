<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="Super Plomb Elec">
  <title>Super Plomb Elec</title>
  <!-- Cordon électrique jaune -->
  <path d="M 380 60 Q 460 130 430 220 Q 400 310 280 305 Q 180 300 160 270"
        fill="none" stroke="#F2C203" stroke-width="22" stroke-linecap="round"/>
  <!-- Prise électrique en haut -->
  <g transform="translate(355,30)">
    <rect x="0" y="0" width="48" height="42" rx="10" fill="#F2C203"/>
    <rect x="-2" y="-18" width="9" height="26" rx="3" fill="#F2C203"/>
    <rect x="22" y="-18" width="9" height="26" rx="3" fill="#F2C203"/>
  </g>
  <!-- Goutte d'eau bleue -->
  <path d="M 305 70 Q 240 150 230 230 Q 230 295 305 295 Q 380 295 380 230 Q 370 150 305 70 Z"
        fill="none" stroke="#3D9FD4" stroke-width="18" stroke-linejoin="round"/>
  <!-- Texte SUPER -->
  <text x="10" y="85" font-family="Nunito, system-ui, sans-serif" font-weight="900" font-size="78" fill="#3D9FD4" letter-spacing="-1">SUPER</text>
  <!-- Texte PLOMB -->
  <text x="10" y="170" font-family="Nunito, system-ui, sans-serif" font-weight="900" font-size="78" fill="#3D9FD4" letter-spacing="-1">PLOMB</text>
  <!-- Texte ELEC -->
  <text x="10" y="255" font-family="Nunito, system-ui, sans-serif" font-weight="900" font-size="78" fill="#F2C203" letter-spacing="-1">ELEC</text>
</svg>
